bio: |
  I am a Research Engineer at Singapore Management University working across quantum computing, quantum algorithms, and AI. My work spans hybrid quantum-classical optimization, Shor-style factoring experiments, quantum simulation and differential-equation solvers, LLM-guided research loops, AI agents, and scientific software systems. I build with quantum packages such as Qiskit, PennyLane, Cirq, and D-Wave workflows, and with AI/programming stacks including Python, C/C++, JavaScript/TypeScript, Java, CUDA, JAX, PyTorch, and language-model tooling.
